  const [err, setErr] = useState("");

        </div>

        <div className="card" style={{ borderColor: "#1e3a5f" }}>
          <div className="section-label">Anthropic API Key</div>
          <p style={{ fontSize: 13, color: "#94a3b8", marginBottom: 18, lineHeight: 1.6 }}>
            Inserisci la tua chiave API Anthropic. Viene salvata solo nel browser locale

          <div style={{ position: "relative", marginBottom: 12 }}>

          </div>
          {err && <div style={{ fontSize: 12, color: "#f87171", marginBottom: 10 }}>⚠ {err}</div>}
          <button
            onClick={save}
            style={{
              width: "100%", background: "#c0392b", color: "#fff", border: "none",

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("apogeo_api_key") || "");
  const [rooming, setRooming] = useState("");
  const [discoteca, setDiscoteca] = useState(false);
  const [dataArrivo, setDataArrivo] = useState("");
  const [noteExtra, setNoteExtra] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const outputRef = useRef(null);

  if (!apiKey) return <ApiKeyScreen onSave={setApiKey} />;

  async function elabora() {
    if (!rooming.trim()) { setError("Inserisci la rooming list."); return; }
    setError(""); setResult(null); setLoading(true);

    const userMsg = [
      dataArrivo ? `Data di arrivo: ${dataArrivo}` : "Data di arrivo: non specificata, usa la data odierna per il calcolo età.",
      discoteca ? "⚠️ EVENTO DISCOTECA/SALA POP PREVISTO." : "Nessun evento discoteca previsto.",
      noteExtra ? `Note aggiuntive: ${noteExtra}` : "",
      "",
      "ROOMING LIST:",
      rooming.trim(),
    ].filter(Boolean).join("\n");

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          system: SYSTEM_PROMPT,
          messages: [{ role: "user", content: userMsg }],
        }),
      });

      if (!res.ok) {
        const e = await res.json();
        if (res.status === 401) {
          localStorage.removeItem("apogeo_api_key");
          setApiKey("");
          return;
        }
        throw new Error(e.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const text = data.content?.map(b => b.text || "").join("") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      setResult(JSON.parse(clean));
      setTimeout(() => outputRef.current?.scrollIntoView({ behavior: "smooth" }), 150);
    } catch (e) {
      setError("Errore: " + e.message);
    } finally {
      setLoading(false);
    }
  }

  function copyTSV() {
    if (!result) return;
    const hdr = "Camera\tTipo\tPiano\tOspiti\tEtà media\tNote";
    const rows = [...result.assegnazioni]
      .sort((a, b) => {
        const n = s => s === "130" ? 130 : parseInt(s);
        return n(a.camera_hotel) - n(b.camera_hotel);
      })
      .map(a => `${a.camera_hotel}\t${a.tipologia_usata}\t${a.piano}\t${a.ospiti.join(", ")}\t${a.eta_media}\t${a.note}`);
    navigator.clipboard.writeText([hdr, ...rows].join("\n"))
      .then(() => alert("Tabella copiata — incollala direttamente in Excel."));
  }

  function resetKey() {
    if (confirm("Rimuovere la chiave API salvata?")) {
      localStorage.removeItem("apogeo_api_key");
      setApiKey("");
    }
  }

  const sorted = result
    ? [...result.assegnazioni].sort((a, b) => {
        const n = s => s === "130" ? 130 : parseInt(s);
        return n(a.camera_hotel) - n(b.camera_hotel);
      })
    : [];

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* ── HEADER ── */}
      <div style={{
        background: "linear-gradient(135deg, #131c2e 0%, #0a0f1a 100%)",
        borderBottom: "1px solid #1e3a5f",
        padding: "18px 28px",
        position: "sticky", top: 0, zIndex: 100,
        backdropFilter: "blur(8px)",
      }}>
        <div className="header-inner" style={{ maxWidth: 900, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{
              width: 38, height: 38, borderRadius: 4,
              background: "#c0392b", display: "flex", alignItems: "center", justifyContent: "center",
              flexShrink: 0,
            }}>
              <div style={{
                width: 29, height: 29, borderRadius: "50%",
                background: "#fff", display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <span style={{ fontSize: 17, fontWeight: 900, color: "#000", fontFamily: "Georgia, serif", lineHeight: 1 }}>K</span>
              </div>
            </div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#f1f5f9", letterSpacing: 0.3 }}>
                Assegnazione Camere
              </div>
              <div style={{ fontSize: 11, color: "#475569", letterSpacing: 1.2, textTransform: "uppercase" }}>
                Hotel Apogeo · MAYA srl
              </div>
            </div>
          </div>
          <button onClick={resetKey} title="Cambia API key"
            style={{
              background: "none", border: "1px solid #1e3a5f", borderRadius: 5,
              color: "#475569", fontSize: 12, padding: "5px 10px",
            }}>🔑 API key</button>
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 20px 60px" }}>

        {/* ── INPUT CARD ── */}
        <div className="card fade-in">
          <div className="section-label">Rooming List</div>

          <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
            <div>
              <label style={{ fontSize: 12, color: "#64748b", display: "block", marginBottom: 5 }}>Data arrivo</label>
              <input type="date" value={dataArrivo} onChange={e => setDataArrivo(e.target.value)}
                style={{
                  width: "100%", background: "#0a0f1a", border: "1px solid #1e3a5f",
                  borderRadius: 5, color: "#e2e8f0", padding: "9px 12px", fontSize: 13,
                }}/>
            </div>
            <div>
              <label style={{ fontSize: 12, color: "#64748b", display: "block", marginBottom: 5 }}>Note aggiuntive</label>
              <input type="text" value={noteExtra}
                onChange={e => setNoteExtra(e.target.value)}
                placeholder="es. capo gruppo = Bianchi, VIP cam. 34..."
                style={{
                  width: "100%", background: "#0a0f1a", border: "1px solid #1e3a5f",
                  borderRadius: 5, color: "#e2e8f0", padding: "9px 12px", fontSize: 13,
                }}/>
            </div>
          </div>

          <div
            onClick={() => setDiscoteca(d => !d)}
            style={{
              display: "inline-flex", alignItems: "center", gap: 10, cursor: "pointer",
              background: discoteca ? "rgba(127,29,29,0.4)" : "transparent",
              border: `1px solid ${discoteca ? "#dc2626" : "#1e3a5f"}`,
              borderRadius: 6, padding: "8px 14px", marginBottom: 14,
              userSelect: "none", transition: "all 0.2s",
            }}>
            <span style={{ fontSize: 14 }}>{discoteca ? "🔴" : "⚫"}</span>
            <span style={{ fontSize: 13, color: discoteca ? "#fca5a5" : "#64748b", fontWeight: discoteca ? 600 : 400 }}>
              Evento discoteca / Sala Pop previsto
            </span>
          </div>

          <textarea
            value={rooming}
            onChange={e => setRooming(e.target.value)}
            placeholder={"Incolla la rooming list in qualsiasi formato:\n\n101  Marco Bianchi  Doppia matrimoniale  14/03/1978\n102  Laura Rossi  Singola  22/11/1989\n103  Paolo Conti / Elisa Neri  Twin  05/07/1965 / 18/01/1970\n...\n\nAccetta: testo libero, tabelle Word/Excel, CSV, elenchi"}
            rows={11}
            style={{
              width: "100%", background: "#0a0f1a", border: "1px solid #1e3a5f",
              borderRadius: 5, color: "#e2e8f0", padding: "12px 14px", fontSize: 13,
              fontFamily: "'IBM Plex Mono', monospace", resize: "vertical", lineHeight: 1.65,
            }}
          />

          <div style={{ marginTop: 14, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            <button
              onClick={elabora} disabled={loading}
              style={{
                background: loading ? "#374151" : "#c0392b", color: "#fff",
                border: "none", borderRadius: 6, padding: "11px 26px",
                fontSize: 14, fontWeight: 700, letterSpacing: 0.4,
                opacity: loading ? 0.8 : 1,
              }}>
              {loading ? <><span className="spinner"/>Elaborazione...</> : "▶  Elabora"}
            </button>
            {result && (
              <button onClick={() => { setResult(null); setRooming(""); setError(""); }}
                style={{
                  background: "transparent", border: "1px solid #334155",
                  color: "#64748b", borderRadius: 6, padding: "11px 18px", fontSize: 13,
                }}>✕ Nuova</button>
            )}
          </div>

          {error && (
            <div style={{
              marginTop: 14, background: "#450a0a", border: "1px solid #dc2626",
              borderRadius: 5, padding: 13, fontSize: 13, color: "#fca5a5",
              fontFamily: "'IBM Plex Mono', monospace", whiteSpace: "pre-wrap",
            }}>{error}</div>
          )}
        </div>

        {/* ── OUTPUT ── */}
        {result && (
          <div ref={outputRef} className="fade-in">

            {/* Controllo preliminare */}
            <div className="card">
              <div className="section-label">Controllo Preliminare</div>
              <div style={{ display: "flex", gap: 28, flexWrap: "wrap", marginBottom: 12 }}>
                <div style={{ fontSize: 13 }}>
                  <span style={{ color: "#64748b" }}>Camere richieste: </span>
                  <strong style={{ color: "#60a5fa", fontFamily: "monospace" }}>
                    {result.controllo_preliminare?.camere_richieste}
                  </strong>
                </div>
                <div style={{ fontSize: 13 }}>
                  <span style={{ color: "#64748b" }}>Ospiti totali: </span>
                  <strong style={{ color: "#60a5fa", fontFamily: "monospace" }}>
                    {result.controllo_preliminare?.ospiti_totali}
                  </strong>
                </div>
              </div>
              {result.controllo_preliminare?.anomalie?.length > 0 && (
                <div style={{ background: "#451a03", border: "1px solid #d97706", borderRadius: 5, padding: 12 }}>
                  {result.controllo_preliminare.anomalie.map((a, i) => (
                    <div key={i} style={{ fontSize: 13, color: "#fde68a", padding: "2px 0" }}>⚠ {a}</div>
                  ))}
                </div>
              )}
              {(!result.controllo_preliminare?.anomalie || result.controllo_preliminare.anomalie.length === 0) && (
                <div style={{ fontSize: 13, color: "#4ade80" }}>✅ Nessuna anomalia rilevata</div>
              )}
            </div>

            {/* Tabella assegnazioni */}
            <div className="card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div className="section-label" style={{ margin: 0 }}>Assegnazioni ({sorted.length} camere)</div>
                <button onClick={copyTSV} style={{
                  background: "#0a0f1a", border: "1px solid #1e3a5f", borderRadius: 5,
                  color: "#94a3b8", fontSize: 12, padding: "5px 12px",
                }}>📋 Copia per Excel</button>
              </div>
              <div style={{ overflowX: "auto", borderRadius: 5, border: "1px solid #1e3a5f" }}>
                <table>
                  <thead>
                    <tr style={{ background: "#0a0f1a" }}>
                      {["Cam.", "Tipo", "Piano", "Ospiti", "Età", "Note"].map(h => (
                        <th key={h} style={{
                          padding: "10px 12px", fontSize: 10, fontWeight: 700,
                          letterSpacing: 1.2, textTransform: "uppercase", color: "#475569",
                          textAlign: "left", whiteSpace: "nowrap", borderBottom: "1px solid #1e3a5f",
                        }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {sorted.map((a, i) => (
                      <tr key={i} style={{ borderBottom: "1px solid #131c2e" }}>
                        <td style={{ padding: "10px 12px", fontFamily: "'IBM Plex Mono', monospace", fontSize: 17, fontWeight: 800,
                          color: a.piano === "P1" ? "#60a5fa" : "#4ade80", whiteSpace: "nowrap" }}>
                          {a.camera_hotel}
                        </td>
                        <td style={{ padding: "10px 12px" }}><TipoBadge t={a.tipologia_usata} /></td>
                        <td style={{ padding: "10px 12px" }}><PianoBadge p={a.piano} /></td>
                        <td style={{ padding: "10px 12px", fontSize: 13, color: "#cbd5e1" }}>
                          {a.ospiti.join(" · ")}
                        </td>
                        <td style={{ padding: "10px 12px", fontSize: 13, color: "#94a3b8", fontFamily: "monospace", whiteSpace: "nowrap" }}>
                          {a.eta_media}
                        </td>
                        <td style={{ padding: "10px 12px", fontSize: 12, color: "#64748b", maxWidth: 200 }}>
                          {a.note}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Decisioni + Compromessi */}
            <div className="grid-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 0 }}>
              <div className="card" style={{ marginBottom: 0 }}>
                <div className="section-label">Decisioni chiave</div>
                {result.decisioni?.map((d, i) => (
                  <div key={i} style={{
                    fontSize: 13, color: "#cbd5e1", padding: "7px 0",
                    borderBottom: "1px solid #1e293b30", display: "flex", gap: 10,
                  }}>
                    <span style={{ color: "#60a5fa", fontWeight: 700, fontFamily: "monospace", minWidth: 22, fontSize: 12 }}>
                      {String(i+1).padStart(2,"0")}
                    </span>
                    {d}
                  </div>
                ))}
              </div>
              <div className="card" style={{ marginBottom: 0 }}>
                <div className="section-label">Compromessi</div>
                {result.compromessi?.length > 0
                  ? result.compromessi.map((c, i) => (
                    <div key={i} style={{
                      fontSize: 13, color: "#fde68a", padding: "7px 0",
                      borderBottom: "1px solid #1e293b30", display: "flex", gap: 10,
                    }}>
                      <span style={{ color: "#f59e0b", minWidth: 16 }}>⚠</span>{c}
                    </div>
                  ))
                  : <div style={{ fontSize: 13, color: "#4ade80" }}>✅ Nessun compromesso rilevante</div>
                }
              </div>
            </div>

            {/* Autovalutazione */}
            <div className="card" style={{ marginTop: 16 }}>
              <div className="section-label">Autovalutazione</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 2 }}>
                {Object.entries(AUTOVAL_LABELS).map(([k, label]) => {
                  const ok = result.autovalutazione?.[k];
                  return (
                    <div key={k} style={{
                      display: "flex", gap: 8, alignItems: "flex-start",
                      padding: "5px 0", borderBottom: "1px solid #0a0f1a20",
                    }}>
                      <span style={{ fontSize: 14, minWidth: 18 }}>{ok ? "✅" : "❌"}</span>
                      <span style={{ fontSize: 12, color: ok ? "#94a3b8" : "#f87171" }}>{label}</span>
                    </div>
                  );
                })}
              </div>
              {result.autovalutazione?.note_autovalutazione && (
                <div style={{ marginTop: 12, fontSize: 12, color: "#64748b", fontStyle: "italic", borderTop: "1px solid #1e3a5f", paddingTop: 10 }}>
                  {result.autovalutazione.note_autovalutazione}
                </div>
              )}
            </div>

          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
